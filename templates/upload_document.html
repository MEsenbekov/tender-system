{% extends 'base.html' %}

{% block title %}Загрузка документа{% endblock %}

{% block content %}
<h2>Загрузка документа</h2>

<div class="card">
    <p><strong>Тендер:</strong> {{ application.tender.title }}</p>
    <p><strong>Поставщик:</strong> {{ application.supplier.username }}</p>
</div>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="field">
        <label><b>Описание документа</b></label>
        <input type="text" name="description" placeholder="Например: сертификат, лицензия, коммерческое предложение">
    </div>

    <div class="field">
        <label><b>Файл</b></label>
        <input type="file" name="file" required>
    </div>

    <button type="submit">Загрузить</button>
</form>
{% endblock %}
