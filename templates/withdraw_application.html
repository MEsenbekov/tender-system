{% extends 'base.html' %}

{% block title %}Отзыв заявки{% endblock %}

{% block content %}
<h2>Отзыв заявки</h2>

<div class="card">
    <p><strong>Тендер:</strong> {{ application.tender.title }}</p>
    <p><strong>Цена:</strong> {{ application.price }}</p>
    <p><strong>Статус:</strong> {{ application.status }}</p>
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-danger">Подтвердить отзыв заявки</button>
</form>
{% endblock %}
