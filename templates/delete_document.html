{% extends 'base.html' %}

{% block title %}Удаление документа{% endblock %}

{% block content %}
<h2>Удаление документа</h2>

<div class="card">
    <p><strong>Описание:</strong> {{ document.description|default:"—" }}</p>
    <p><strong>Файл:</strong> {{ document.file.name }}</p>
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Подтвердить удаление</button>
</form>
{% endblock %}
