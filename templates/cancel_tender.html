{% extends 'base.html' %}

{% block title %}Отмена тендера{% endblock %}

{% block content %}
<h2>Отмена тендера</h2>

<div class="card">
    <h3>{{ tender.title }}</h3>
    <p>{{ tender.description }}</p>
    <p><strong>Статус:</strong> {{ tender.status }}</p>
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-danger">Подтвердить отмену</button>
</form>
{% endblock %}
